name: intercom_test
description: End-to-end test for Intercom source using Monke

connector:
  name: Intercom
  type: intercom
  auth_mode: composio
  composio_config:
    account_id: "ca__30XNlnkObzu"
    auth_config_id: "ac_fLTcUed-9USQ"
  config_fields:
    exclude_closed_conversations: false
    openai_model: "gpt-4o-mini"
    rate_limit_delay_ms: 500

test_flow:
  steps:
    - cleanup
    - create
    - sync
    - verify
    - update
    - sync
    - verify
    - partial_delete
    - sync
    - verify_partial_deletion
    - verify_remaining_entities
    - complete_delete
    - sync
    - verify_complete_deletion
    - cleanup
    - collection_cleanup

deletion:
  partial_delete_count: 1
  verify_partial_deletion: true
  verify_remaining_entities: true
  verify_complete_deletion: true

entity_count: 2

collection:
  name: Intercom Test Collection

verification:
  retry_attempts: 3
  retry_delay_seconds: 5
  score_threshold: 0.0
  expected_fields:
    - name
    - description
    - ticket_id
    - state
